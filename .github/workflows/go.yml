name: Go

on:
  pull_request:
    branches:
    - master
    - main
  push:
    branches:
    - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  build:
    name: Test on Go ${{ matrix.go-version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go-version: [1.26.x]
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '25'
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build on ${{ matrix.os }}
        if: matrix.os == 'windows-latest'
        env:
          CGO_ENABLED: 0
          GO111MODULE: on
        run: |
          go build --ldflags="-s -w" -o %GOPATH%\bin\obstor.exe
          go test -v --timeout 50m ./cmd/http/... ./pkg/auth/... ./pkg/hash/... ./pkg/certs/... ./pkg/net/... ./pkg/iam/policy/... ./pkg/s3select/csv/...
      - name: Build on ${{ matrix.os }}
        if: matrix.os == 'ubuntu-latest'
        env:
          CGO_ENABLED: 0
          GO111MODULE: on
        run: |
          sudo sysctl net.ipv6.conf.all.disable_ipv6=0
          sudo sysctl net.ipv6.conf.default.disable_ipv6=0
          sudo apt install -y devscripts shellcheck
          go build -trimpath --ldflags="-s -w" -o obstor
          go test --timeout 50m $(go list ./cmd/http/... ./pkg/... | grep -v -E 'event/target|licverifier|mountinfo|s3select$|trie')
          cd browser && pnpm install && pnpm run format && cd ..
          bash -c 'shopt -s globstar; shellcheck tests/**/*.sh'

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
